name: 🎵 Radio Javan Independent Downloader

on:
  workflow_dispatch:
    inputs:
      podcast_url:
        description: '🔗 لینک پادکست، ریمیکس یا آهنگ رادیو جوان'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  download-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Start Cloudflare WARP (Bypass Blocks & Cloudflare 403)
        run: |
          echo "Starting WARP for Radio Javan..."
          docker network create warp-net || true
          docker run -d --name warp --restart=always --network warp-net -p 1080:1080 --cap-add NET_ADMIN --sysctl net.ipv6.conf.all.disable_ipv6=0 --sysctl net.ipv4.conf.all.src_valid_mark=1 -v warp-data:/var/lib/cloudflare-warp caomingjun/warp
          sleep 15

      - name: Install Advanced Downloader & JS Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip curl
          # نصب موتور Deno جهت حل چالش‌های امنیتی جاوااسکریپت کلودفلر
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install --upgrade yt-dlp

      - name: Download from Radio Javan via Proxy
        env:
          RJ_URL: ${{ github.event.inputs.podcast_url }}
        run: |
          mkdir -p podcasts
          echo "Processing URL with WARP Proxy & Deno Engine: $RJ_URL"
          
          # استفاده از پروکسی ساکس ۵ وارپ و شبیه‌سازی کامل هدرهای مرورگر واقعی
          yt-dlp --proxy "socks5://127.0.0.1:1080" \
            --no-cache-dir \
            --retries 5 \
            --no-playlist \
            --js-runtimes deno \
            --remote-components ejs:github \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -o "podcasts/%(title)s.%(ext)s" "$RJ_URL"

      - name: Stop Cloudflare WARP
        if: always()
        run: docker stop warp && docker rm warp || true

      - name: Save File and Commit to GitHub Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          
          if [ -d "podcasts" ]; then
            git add podcasts/
            if ! git diff --cached --quiet; then
              git commit -m "🎵 Sync: Downloaded from Radio Javan [skip ci]"
              git push origin HEAD:"$BRANCH" || true
              echo "✅ فایل پادکست با موفقیت در پوشه podcasts ذخیره شد."
            else
              echo "تغییری برای ثبت وجود ندارد."
            fi
          fi
