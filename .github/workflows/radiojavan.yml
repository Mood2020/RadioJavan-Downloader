name: 🎵 Radio Javan API Downloader (100% Fixed)

on:
  workflow_dispatch:
    inputs:
      podcast_url:
        description: '🔗 لینک پادکست یا ریمیکس (مثال: majoon-25)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  download-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch directly via Radio Javan Mobile API
        env:
          INPUT_URL: ${{ github.event.inputs.podcast_url }}
        run: |
          mkdir -p podcasts
          
          # استخراج نام تمیز پادکست از انتهای هر نوع لینکی که وارد کنید
          TRACK_NAME=$(echo "$INPUT_URL" | grep -oE '[^/]+$' | cut -d'?' -f1 | cut -d'#' -f1)
          echo "🎯 Target Track: $TRACK_NAME"
          
          # ۱. استفاده از آدرس مستقیم و بدون فیلتر سرورهای اصلی فایل صوتی رادیو جوان
          # این مسیرها از کلودفلر وب عبور نمیکنند و مستقیم فایل میدهند
          CDN_URL="https://host2.rjmusicmedia.com/media/podcast/mp3-320/${TRACK_NAME}.mp3"
          ALT_CDN_URL="https://host1.rjmusicmedia.com/media/podcast/mp3-320/${TRACK_NAME}.mp3"
          
          echo "📥 Requesting secure stream from production CDN..."
          
          # دانلود مستقیم با کلاینت خالص لینوکس و هدر اختصاصی اپلیکیشن
          SUCCESS=false
          if curl -L -f -A "RadioJavanAndroid/2026" "$CDN_URL" -o "podcasts/${TRACK_NAME}_320k.mp3"; then
            echo "✅ دانلود با موفقیت از سرور اصلی انجام شد!"
            SUCCESS=true
          elif curl -L -f -A "RadioJavanAndroid/2026" "$ALT_CDN_URL" -o "podcasts/${TRACK_NAME}_320k.mp3"; then
            echo "✅ دانلود با موفقیت از سرور پشتیبان انجام شد!"
            SUCCESS=true
          fi
          
          # اگر فایل پادکست نبود و ریمیکس عادی بود، مسیر زیربنایی mp3 را تست کن
          if [ "$SUCCESS" = false ]; then
            echo "⚠️ در مسیر پادکست یافت نشد. تلاش در مسیر ریمیکس/ترک صوتی..."
            TRACK_CDN="https://host2.rjmusicmedia.com/media/mp3/${TRACK_NAME}.mp3"
            if curl -L -f -A "RadioJavanAndroid/2026" "$TRACK_CDN" -o "podcasts/${TRACK_NAME}_320k.mp3"; then
              echo "✅ دانلود ریمیکس با موفقیت انجام شد!"
              SUCCESS=true
            fi
          fi
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ خطا: رادیو جوان این فایل را روی دیتاسنتر مسدود کرده یا نام لینک اشتباه است."
            exit 1
          fi

      - name: Save File and Commit to GitHub Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          
          if [ -d "podcasts" ]; then
            git add podcasts/
            if ! git diff --cached --quiet; then
              git commit -m "🎵 Sync: New Radio Javan Track [skip ci]"
              git push origin HEAD:"$BRANCH" || true
              echo "✅ پادکست با موفقیت در پوشه ذخیره شد."
            fi
          fi
