name: 🎵 Radio Javan Independent Downloader

on:
  workflow_dispatch:
    inputs:
      podcast_url:
        description: '🔗 لینک پادکست، ریمیکس یا آهنگ رادیو جوان'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  download-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Core Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y curl grep

      - name: Resolve and Download from Radio Javan
        env:
          INPUT_URL: ${{ github.event.inputs.podcast_url }}
        run: |
          mkdir -p podcasts
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          echo "Processing URL: $INPUT_URL"
          
          # اگر لینک از نوع rj.app بود، آن را باز می‌کنیم تا لینک واقعی play.radiojavan پیدا شود
          if [[ "$INPUT_URL" == *"rj.app"* ]]; then
            echo "Detected short rj.app link. Resolving full play.radiojavan URL..."
            RESOLVED_URL=$(curl -s -I -L -A "$USER_AGENT" "$INPUT_URL" | grep -i "location:" | tail -n 1 | awk '{print $2}' | tr -d '\r')
            if [ -z "$RESOLVED_URL" ]; then
              # راه حل دوم برای استخراج لینک از ریدایرکت‌های جاوااسکریپتی کلودفلر
              RESOLVED_URL=$(curl -s -L -A "$USER_AGENT" "$INPUT_URL" | grep -oP 'window\.location\s*=\s*"\K[^"]+')
            fi
            if [ -n "$RESOLVED_URL" ]; then
              INPUT_URL="$RESOLVED_URL"
              echo "Successfully resolved to: $INPUT_URL"
            fi
          fi

          # استخراج اسم پادکست (مثلاً majoon-25) از انتهای آدرس لینک اصلی
          TRACK_NAME=$(echo "$INPUT_URL" | grep -oE '[^/]+$' | cut -d'?' -f1 | cut -d'#' -f1)
          
          if [ -z "$TRACK_NAME" ]; then
            echo "❌ نتوانستم اسم پادکست را از لینک استخراج کنم."
            exit 1
          fi
          
          echo "🎯 Target Track Name identified as: $TRACK_NAME"
          
          # تست دامنه‌های جدید و فعال بارگذاری رادیو جوان (به ترتیب اولویت دیتاسنترها)
          SUCCESS=false
          for DOMAIN in "www.radiojavan.com" "media.rjplay.xyz" "host2.rjmusicmedia.xyz" "host1.rjmusicmedia.xyz"; do
            DOWNLOAD_URL="https://${DOMAIN}/media/podcast/mp3-320/${TRACK_NAME}.mp3"
            echo "Trying endpoint: $DOWNLOAD_URL"
            
            if curl -L -A "$USER_AGENT" -f "$DOWNLOAD_URL" -o "podcasts/${TRACK_NAME}_320k.mp3"; then
              echo "✅ Download successful from $DOMAIN!"
              SUCCESS=true
              break
            fi
          done
          
          # اگر به عنوان پادکست دانلود نشد، ساختار موزیک معمولی (ریمیکس تک‌آهنگ) را روی دامنه جدید تست می‌کند
          if [ "$SUCCESS" = false ]; then
            echo "⚠️ به عنوان پادکست یافت نشد. تست به عنوان سینگل ترک/ریمیکس معمولی..."
            for DOMAIN in "www.radiojavan.com" "media.rjplay.xyz"; do
              DOWNLOAD_URL="https://${DOMAIN}/media/mp3/${TRACK_NAME}.mp3"
              echo "Trying endpoint: $DOWNLOAD_URL"
              if curl -L -A "$USER_AGENT" -f "$DOWNLOAD_URL" -o "podcasts/${TRACK_NAME}_320k.mp3"; then
                echo "✅ Download successful as standard MP3 track!"
                SUCCESS=true
                break
              fi
            done
          fi
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ خطا: دامنه‌های دانلود رادیو جوان پاسخگو نبودند یا نام آهنگ در سرور تغییر کرده است."
            exit 1
          fi

      - name: Save File and Commit to GitHub Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          
          if [ -d "podcasts" ]; then
            git add podcasts/
            if ! git diff --cached --quiet; then
              git commit -m "🎵 Sync: New Radio Javan Track [skip ci]"
              git push origin HEAD:"$BRANCH" || true
              echo "✅ فایل با موفقیت در پوشه podcasts ریپازیتوری شما ذخیره شد."
            else
              echo "تغییری برای ثبت وجود ندارد."
            fi
          fi
