name: 🎵 Radio Javan Independent Downloader

on:
  workflow_dispatch:
    inputs:
      podcast_url:
        description: '🔗 لینک پادکست، ریمیکس یا آهنگ رادیو جوان'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  download-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Advanced Downloader & Patches
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip curl jq
          pip3 install --upgrade yt-dlp

      - name: Normalize URL and Download Safely
        env:
          INPUT_URL: ${{ github.event.inputs.podcast_url }}
        run: |
          mkdir -p podcasts
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          
          echo "Original Input URL: $INPUT_URL"
          
          # ۱. تبدیل و بومی‌سازی انواع لینک‌های جدید و کوتاه رادیو جوان به ساختار استاندارد قابل فهم برای yt-dlp
          if [[ "$INPUT_URL" == *"play.radiojavan.com/podcast/"* ]]; then
            TRACK_NAME=$(echo "$INPUT_URL" | grep -oE 'podcast/[^/]+' | cut -d'/' -f2 | cut -d'?' -f1)
            FINAL_URL="https://www.radiojavan.com/podcasts/podcast/${TRACK_NAME}"
          elif [[ "$INPUT_URL" == *"play.radiojavan.com/mp3/"* ]]; then
            TRACK_NAME=$(echo "$INPUT_URL" | grep -oE 'mp3/[^/]+' | cut -d'/' -f2 | cut -d'?' -f1)
            FINAL_URL="https://www.radiojavan.com/mp3s/mp3/${TRACK_NAME}"
          elif [[ "$INPUT_URL" == *"rj.app/p/"* ]]; then
            echo "❌ لینک‌های کوتاه rj.app به دلیل سپر امنیتی شدید کلودفلر مستقیماً روی سرورهای ابری باز نمی‌شوند."
            echo "💡 لطفاً لینک کامل پادکست را از مرورگر کپی کنید (مانند نمونه play.radiojavan.com)."
            exit 1
          else
            FINAL_URL="$INPUT_URL"
          fi
          
          echo "🎯 Normalized URL for Extractor: $FINAL_URL"
          
          # ۲. اجرای مستقیم دانلود با هدرهای تزریقی و شبیه‌سازی درخواست‌های موبایلی/وب
          yt-dlp --no-cache-dir \
            --retries 5 \
            --no-playlist \
            --add-header "User-Agent:$USER_AGENT" \
            --add-header "Accept:text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8" \
            --add-header "Accept-Language:en-US,en;q=0.5" \
            --add-header "Referer:https://www.radiojavan.com/" \
            -o "podcasts/%(title)s.%(ext)s" "$FINAL_URL"

      - name: Save File and Commit to GitHub Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          
          if [ -d "podcasts" ]; then
            git add podcasts/
            if ! git diff --cached --quiet; then
              git commit -m "🎵 Sync: Downloaded from Radio Javan [skip ci]"
              git push origin HEAD:"$BRANCH" || true
              echo "✅ فایل با موفقیت در پوشه podcasts ذخیره شد."
            else
              echo "فایل جدیدی یافت نشد یا تغییرات ذخیره نشده است."
            fi
          fi
