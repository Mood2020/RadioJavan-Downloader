name: 🎵 Radio Javan Independent Downloader

on:
  workflow_dispatch:
    inputs:
      podcast_url:
        description: '🔗 لینک پادکست، ریمیکس یا آهنگ رادیو جوان'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  download-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Advanced Downloader (yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip curl
          pip3 install --upgrade yt-dlp

      - name: Download from Radio Javan Safely
        env:
          RJ_URL: ${{ github.event.inputs.podcast_url }}
        run: |
          mkdir -p podcasts
          echo "Processing URL with yt-dlp: $RJ_URL"
          
          # ابزار yt-dlp خودش لینک‌های کوتاه rj.app را رمزگشایی کرده و سرور فعال را پیدا می‌کند
          yt-dlp --no-cache-dir --retries 5 --no-playlist -o "podcasts/%(title)s.%(ext)s" "$RJ_URL"

      - name: Save File and Commit to GitHub Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          
          if [ -d "podcasts" ]; then
            git add podcasts/
            if ! git diff --cached --quiet; then
              git commit -m "🎵 Sync: Downloaded from Radio Javan [skip ci]"
              git push origin HEAD:"$BRANCH" || true
              echo "✅ فایل با نام اصلی خود پادکست در پوشه podcasts ذخیره شد."
            else
              echo "تغییری برای ثبت وجود ندارد."
            fi
          fi
