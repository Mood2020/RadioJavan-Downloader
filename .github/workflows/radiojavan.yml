name: 🎵 Radio Javan Independent Downloader

on:
  workflow_dispatch:
    inputs:
      podcast_url:
        description: '🔗 لینک پادکست رادیو جوان (از مرورگر)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  download-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Python Extractor and Download
        env:
          INPUT_URL: ${{ github.event.inputs.podcast_url }}
        shell: python
        run: |
          import os
          import re
          import requests

          url = os.environ['INPUT_URL'].strip()
          track_name = url.split('/')[-1].split('?')[0].split('#')[0]
          print(f"🎯 Target Track Name: {track_name}")

          os.makedirs("podcasts", exist_ok=True)

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Referer": "https://play.radiojavan.com/",
              "Origin": "https://play.radiojavan.com",
              "Accept": "*/*"
          }

          print("🔍 Fetching page source to extract secure media link...")
          response = requests.get(url, headers=headers, timeout=15)
          if response.status_code != 200:
              print(f"❌ Error fetching page: {response.status_code}")
              exit(1)

          # استخراج لینک مستقیم فایل MP3 از سورس صفحه
          mp3_links = re.findall(r'https?://[^\s"\']+\.mp3[^\s"\']*', response.text)
          final_url = None
          
          if mp3_links:
              final_url = mp3_links[0].replace('\\', '').strip()
          else:
              matches = re.findall(r'"link"\s*:\s*"([^"]+)"', response.text)
              if matches:
                  final_url = matches[0].replace('\\/', '/').replace('\\', '').strip()

          if not final_url:
              print("❌ Could not find the MP3 link in page source.")
              exit(1)

          print(f"✅ Extracted URL: {final_url}")
          print("📥 Downloading via GitHub high-speed servers...")
          
          file_response = requests.get(final_url, headers=headers, stream=True, timeout=60)
          if file_response.status_code == 200:
              file_path = f"podcasts/{track_name}.mp3"
              with open(file_path, 'wb') as f:
                  for chunk in file_response.iter_content(chunk_size=1024*1024): # چانک‌های ۱ مگابایتی برای دانلود سریع‌تر
                      f.write(chunk)
              print(f"✨ Successfully saved to repository: {file_path}")
          else:
              print(f"❌ Download failed with status code: {file_response.status_code}")
              exit(1)

      - name: Save File and Commit to GitHub Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          
          if [ -d "podcasts" ]; then
            git add podcasts/
            if ! git diff --cached --quiet; then
              git commit -m "🎵 Sync: Downloaded ${GITHUB_RUN_NUMBER} from Radio Javan [skip ci]"
              git push origin HEAD:"$BRANCH" || true
              echo "✅ فایل با موفقیت در پوشه podcasts ذخیره شد."
            else
              echo "تغییری برای کامیت وجود ندارد."
            fi
          fi
